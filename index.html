<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暦占 こよみうら ― 和暦とことばで、あなたを読む</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --washi:#F2EDE0;
    --sumi:#262622;
    --ai:#2A4B7C;
    --ai-usui:#8FA3BF;

    --kin:#9C8A5A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--washi);
    color:var(--sumi);
    font-family:'Shippori Mincho',serif;
    line-height:1.9;

  .container{max-width:640px;margin:0 auto;padding:0 20px 80px;}
  header{text-align:center;padding:56px 0 40px;}
  .title-eyebrow{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:11px;letter-spacing:.35em;color:var(--ai);
    margin-bottom:14px;
  }
  h1{
    font-size:clamp(34px,8vw,46px);
    font-weight:500;letter-spacing:.18em;
  }

  .divider{width:1px;height:44px;background:var(--kin);margin:34px auto 0;opacity:.6;}

  .form-card{
    border:1px solid rgba(38,38,34,.18);
    padding:34px 28px;
    background:rgba(255,255,255,.42);
  }
  .form-label{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:12px;letter-spacing:.2em;color:var(--ai);
    display:block;margin-bottom:14px;
  }
  .date-row{display:flex;gap:10px;}
  select{
    flex:1;appearance:none;
    font-family:'Shippori Mincho',serif;font-size:16px;color:var(--sumi);
    background:var(--washi);border:1px solid rgba(38,38,34,.3);
    padding:12px 10px;text-align:center;border-radius:0;
  }
  select:focus{outline:2px solid var(--ai);outline-offset:1px;}
  button.uranau{
    display:block;width:100%;margin-top:24px;
    font-family:'Shippori Mincho',serif;font-size:17px;letter-spacing:.5em;text-indent:.5em;
    color:var(--washi);background:var(--ai);border:none;
    padding:15px 0;cursor:pointer;transition:background .25s;
  }
  button.uranau:hover{background:#1e3a63;}
  button.uranau:focus-visible{outline:2px solid var(--rakkan);outline-offset:2px;}

  #result{display:none;margin-top:52px;animation:appear .9s ease both;}
  @keyframes appear{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){#result{animation:none;}}

  .kou-header{text-align:center;margin-bottom:8px;}
  .sekki-label{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:11px;letter-spacing:.3em;color:var(--kin);
  }
  .kou-name{font-size:clamp(30px,7vw,40px);letter-spacing:.14em;font-weight:500;margin:6px 0 2px;}
  .kou-yomi{font-size:14px;letter-spacing:.3em;color:#6a6a60;}

  /* 広重の絵 */
  .art-frame{display:none;margin:34px auto 0;max-width:380px;}
  .art-frame.show{display:block;}
  .art-frame img{
    width:100%;display:block;
    border:1px solid rgba(38,38,34,.35);
    box-shadow:0 6px 18px rgba(38,38,34,.18);
  }
  .art-credit{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:12px;color:#8a8a80;text-align:center;
    margin-top:8px;letter-spacing:.05em;
  }

  .tanzaku-wrap{display:flex;justify-content:center;margin:36px 0;}
  .tanzaku{
    writing-mode:vertical-rl;
    background:linear-gradient(160deg,#FBF8EF 0%,#F6F0DF 100%);
    border:1px solid rgba(156,138,90,.5);
    box-shadow:3px 4px 0 rgba(42,75,124,.12);

  .tanzaku .author{font-size:13px;color:#6a6a60;letter-spacing:.2em;margin-top:auto;}
  .rakkan{
    position:absolute;bottom:16px;left:14px;
    writing-mode:horizontal-tb;
    width:30px;height:30px;background:var(--rakkan);color:#fff;

    font-family:'Zen Kaku Gothic New',sans-serif;

  p.body-text{font-size:17px;color:#3c3c36;}
  .suuhi-tag{
    display:inline-block;margin-top:14px;

  .kyou-level{font-size:22px;letter-spacing:.2em;color:var(--rakkan);font-weight:700;margin-bottom:8px;}

  }
  a.share-x:hover{background:#000;}
  .retry{margin-top:18px;text-align:center;}
  .retry button{
    background:none;border:none;font-family:'Shippori Mincho',serif;
    font-size:13px;color:var(--ai);text-decoration:underline;cursor:pointer;letter-spacing:.1em;
  }
  footer{
    margin-top:70px;text-align:center;
    font-family:'Zen Kaku Gothic New',sans-serif;

</style>
</head>

    <div class="kyou-box">

</div>

<script>

// ===== ロジック =====
function toMMDD(m,d){return m*100+d;}

function findKou(m,d){
  const v=toMMDD(m,d);
  for(let i=0;i<KOU.length;i++){
    const[s,e]=KOU[i].range;
    if(s<=e){ if(v>=s&&v<=e)return i; }
    else{ if(v>=s||v<=e)return i; } // 年またぎ(閉塞成冬)
  }
  return 0;
}

function suuhiNum(y,m,d){
  let s=String(y)+String(m).padStart(2,"0")+String(d).padStart(2,"0");
  let n=[...s].reduce((a,c)=>a+ +c,0);
  while(n>9)n=[...String(n)].reduce((a,c)=>a+ +c,0);
  return n===0?9:n;
}

function uranau(){
  const y=+document.getElementById("year").value;
  const m=+document.getElementById("month").value;
  const d=+document.getElementById("day").value;

  const bi=findKou(m,d);
  const k=KOU[bi];
  const n=suuhiNum(y,m,d);
  const s=SUUHI[n];

  const today=new Date();
  const ti=findKou(today.getMonth()+1,today.getDate());
  const dist=(ti-bi+12)%12;
  const ky=KYOU[dist];
  const tk=KOU[ti];

  // 広重の絵(img/1.jpg〜img/12.jpg をリポジトリに置くと表示される)
  const frame=document.getElementById("artFrame");
  const img=document.getElementById("artImg");
  frame.classList.remove("show");
  img.onload=()=>frame.classList.add("show");
  img.onerror=()=>frame.classList.remove("show");
  img.src="img/"+(bi+1)+".jpg";
  img.alt="歌川広重「名所江戸百景 "+k.art+"」";
  document.getElementById("artCredit").textContent="歌川広重「名所江戸百景 "+k.art+"」(国立国会図書館蔵・保護期間満了)";

  document.getElementById("sekkiLabel").textContent="二十四節気「"+k.sekki+"」のころ";
  document.getElementById("kouName").textContent=k.name;
  document.getElementById("kouYomi").textContent=k.yomi;
  document.getElementById("poem").textContent=k.poem;
  document.getElementById("poemAuthor").textContent=k.author;
  document.getElementById("honshitsuCopy").textContent="「"+k.essence+"」× "+s.name+"の質";
  document.getElementById("honshitsuBody").textContent=k.body+" さらにあなたには「"+s.text+"」という数の質(数秘"+n+")が重なります。季節の力と数の力、ふたつを合わせ持つのがあなたです。";
  document.getElementById("suuhiTag").textContent="数秘 "+n+"・"+s.name+" ／ 縁のもの:"+k.lucky;
  document.getElementById("kyouKou").textContent="今日は「"+tk.name+"("+tk.yomi+")」のころ";
  document.getElementById("kyouLevel").textContent=ky.level;
  document.getElementById("kyouBody").textContent=ky.text;

  const shareText="私の生まれは七十二候「"+k.name+"("+k.yomi+")」――"+k.essence+"。今日の運勢は"+ky.level+"でした。 #暦占 #こよみうら";
  document.getElementById("shareX").href="https://twitter.com/intent/tweet?text="+encodeURIComponent(shareText);

  document.getElementById("result").style.display="block";
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

// ===== セレクト初期化 =====
(function init(){
  const ys=document.getElementById("year"),ms=document.getElementById("month"),ds=document.getElementById("day");
  const now=new Date().getFullYear();
  for(let y=now;y>=1930;y--){const o=new Option(y+"年",y);ys.add(o);}
  ys.value=1980;
  for(let m=1;m<=12;m++)ms.add(new Option(m+"月",m));
  function fillDays(){
    const y=+ys.value,m=+ms.value,max=new Date(y,m,0).getDate(),cur=+ds.value||1;
    ds.innerHTML="";
    for(let d=1;d<=max;d++)ds.add(new Option(d+"日",d));
    ds.value=Math.min(cur,max);
  }
  ys.onchange=fillDays;ms.onchange=fillDays;fillDays();
})();
</script>
